version: '3.8'

services:
  # Bitcoin Prediction API Service
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - LOG_LEVEL=INFO
      - MONGODB_URL=mongodb://mongodb:27017/bitcoin_predictions
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_PER_MINUTE=1000
      - BINANCE_API_URL=https://data-api.binance.vision
      - COINGECKO_API_URL=https://api.coingecko.com/api/v3
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./bitcoin_prediction_api:/app/bitcoin_prediction_api
      - ./bitcoin_forecasting:/app/bitcoin_forecasting
    networks:
      - bitcoin-prediction-network

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=bitcoin_predictions
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    restart: unless-stopped
    networks:
      - bitcoin-prediction-network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - bitcoin-prediction-network

  # React Frontend (will be implemented in later tasks)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - bitcoin-prediction-network
    profiles:
      - frontend  # Optional profile for frontend development

  # Nginx Load Balancer (for production-like testing)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - bitcoin-prediction-network
    profiles:
      - production  # Optional profile for production testing

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  bitcoin-prediction-network:
    driver: bridge